name: Buid and Push Docker Image

on:
    push:
       branches: ["main"]
permissions:
    contents: write
jobs:
   build-and-push:
     runs-on: ubuntu-latest
     steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_TOKEN}}
   

      -  name: Build and Path 
         uses: docker/build-push-action@v4
         with:
            context: .
            push: true
            tags: ${{ secrets.DOCKER_USERNAME}}/ci-cd-v2${{ github.sha}}

      - name: Update Kubernets Manifsests 
        run: |
         git config --global user.name "github-actions[bot]"
         git config --global user.email "github-actions[bot]@users.noreply.github.com"
         sed -i "s|image: .*|image: ${{ secrets.DOCKER_USERNAME}}/ci-cd-v2:${{ github.sha}}|g" k8s.yaml
         git add k8s.yaml
         git commit -m "chore: update image to ${{ github.sha}} [skip ci]"
         git push

